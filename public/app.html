<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌙 City App - Eventos e Bares Noturnos de Jataí</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #fff;
        }

        .app {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding-bottom: 80px;
        }

        .header {
            background: #1e293b;
            padding: 20px;
            border-bottom: 1px solid #334155;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 4px;
        }

        .header p {
            color: #94a3b8;
            font-size: 13px;
        }

        .screen {
            display: none;
            flex: 1;
            overflow-y: auto;
        }

        .screen.active {
            display: flex;
            flex-direction: column;
        }

        .categories {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            padding: 16px;
        }

        .category-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .category-card:hover {
            background: #334155;
            border-color: #7c3aed;
        }

        .category-emoji {
            font-size: 32px;
            margin-bottom: 8px;
        }

        .category-name {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .category-count {
            font-size: 12px;
            color: #94a3b8;
        }

        .section {
            padding: 16px;
        }

        .section-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 12px;
        }

        .page-title {
            font-size: 20px;
            font-weight: bold;
            padding: 16px;
            padding-bottom: 8px;
        }

        .card {
            display: flex;
            flex-direction: column;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            overflow: hidden;
            margin: 0 16px 12px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .card:hover {
            border-color: #7c3aed;
        }

        .card-image {
            width: 100%;
            height: 200px;
            background: #334155;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            overflow: hidden;
        }

        .card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-content {
            padding: 12px;
        }

        .card-name {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .card-category {
            font-size: 12px;
            color: #7c3aed;
            margin-bottom: 4px;
        }

        .card-address {
            font-size: 12px;
            color: #94a3b8;
            margin-bottom: 8px;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
        }

        .card-rating {
            color: #fbbf24;
            font-weight: 600;
        }

        .card-price {
            color: #22c55e;
            font-weight: 600;
        }

        .card-button {
            background: #7c3aed;
            border: none;
            color: #fff;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            margin-top: 8px;
            transition: all 0.3s;
        }

        .card-button:hover {
            background: #6d28d9;
        }

        #map {
            width: 100%;
            height: 400px;
            border-radius: 12px;
            margin: 0 16px 12px;
            border: 1px solid #334155;
        }

        .map-section {
            padding: 16px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            overflow-y: auto;
        }

        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: #1e293b;
            border-radius: 12px;
            padding: 20px;
            max-width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-close {
            float: right;
            font-size: 24px;
            cursor: pointer;
            color: #94a3b8;
        }

        .modal-images {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
            margin: 16px 0;
        }

        .modal-image {
            width: 100%;
            height: 150px;
            background: #334155;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
        }

        .modal-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .modal-info {
            margin-top: 16px;
        }

        .modal-info p {
            margin: 8px 0;
            font-size: 14px;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }

        .modal-button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .modal-button-primary {
            background: #7c3aed;
            color: #fff;
        }

        .modal-button-primary:hover {
            background: #6d28d9;
        }

        .modal-button-secondary {
            background: #334155;
            color: #fff;
        }

        .modal-button-secondary:hover {
            background: #475569;
        }

        .tab-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            display: flex;
            background: #1e293b;
            border-top: 1px solid #334155;
            padding-bottom: 16px;
        }

        .tab-button {
            flex: 1;
            text-align: center;
            padding-top: 12px;
            font-size: 24px;
            cursor: pointer;
            border-top: 2px solid transparent;
            transition: all 0.3s;
        }

        .tab-button.active {
            border-top-color: #7c3aed;
        }

        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- Home Screen -->
        <div id="home" class="screen active">
            <div class="header">
                <h1>🌙 City App</h1>
                <p>Descubra eventos e bares noturnos de Jataí</p>
            </div>

            <div class="categories">
                <div class="category-card" onclick="switchTab('bars')">
                    <div class="category-emoji">🍺</div>
                    <div class="category-name">Bares</div>
                    <div class="category-count">6 locais</div>
                </div>
                <div class="category-card" onclick="switchTab('restaurants')">
                    <div class="category-emoji">🍽️</div>
                    <div class="category-name">Restaurantes</div>
                    <div class="category-count">5 locais</div>
                </div>
                <div class="category-card" onclick="switchTab('map')">
                    <div class="category-emoji">🗺️</div>
                    <div class="category-name">Mapa</div>
                    <div class="category-count">Todos</div>
                </div>
            </div>

            <div class="section">
                <div class="section-title">📍 Próximos Eventos</div>
                <div id="home-events"></div>
            </div>
        </div>

        <!-- Bars Screen -->
        <div id="bars" class="screen">
            <div class="page-title">🍺 Bares de Jataí</div>
            <div id="bars-list"></div>
        </div>

        <!-- Restaurants Screen -->
        <div id="restaurants" class="screen">
            <div class="page-title">🍽️ Restaurantes de Jataí</div>
            <div id="restaurants-list"></div>
        </div>

        <!-- Map Screen -->
        <div id="map-screen" class="screen">
            <div class="page-title">🗺️ Mapa de Locais</div>
            <div class="map-section">
                <div id="map"></div>
            </div>
        </div>

        <!-- Events Screen -->
        <div id="events" class="screen">
            <div class="page-title">🎉 Eventos Noturnos</div>
            <div id="events-list"></div>
        </div>
    </div>

    <!-- Modal para detalhes -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeModal()">&times;</span>
            <div id="modal-body"></div>
        </div>
    </div>

    <!-- Tab Bar -->
    <div class="tab-bar">
        <div class="tab-button active" onclick="switchTab('home')">🏠</div>
        <div class="tab-button" onclick="switchTab('bars')">🍺</div>
        <div class="tab-button" onclick="switchTab('restaurants')">🍽️</div>
        <div class="tab-button" onclick="switchTab('map')">🗺️</div>
        <div class="tab-button" onclick="switchTab('events')">🎉</div>
    </div>

    <script>

            },
            {
                id: 5,
                name: 'Jhonny\'s Bar e Petiscaria',
                category: 'bar',
                rating: 4.5,
                reviews: 267,
                address: 'Av. Brasil, 650',
                hours: '16:00 - 23:00',
                price: 'R$ 25-60',
                city: 'Jataí',

            },
            {

                reviews: 145,
                address: 'Rua Mato Grosso, 1100',
                hours: '18:00 - 04:00',

                image: '🎵',

                phone: '(64) 3461-2468',
            },
        ];

        const restaurants = [
            {
                id: 1,
                name: 'Santa Brasa Café Grill',
                cuisine: 'Grill/Café',
                rating: 4.6,
                reviews: 467,
                address: 'Rua Benjamin Constant, 732',

            },
            {

            },
            {

                cuisine: 'Brasileira Premium',
                rating: 4.6,

                address: 'Av. Dr. Dorival de Carvalho, 550',
                hours: '11:00 - 23:30',

                image: '🥩',
                latitude: -17.8815,
                longitude: -51.7150,
                phone: '(64) 3461-3333',
            },
            {
                id: 4,
                name: 'Rancho Tardezinha',
                cuisine: 'Caseira',
                rating: 4.5,
                reviews: 156,
                address: 'R. B-003, Qd 12 - Lt 06 Setor',
                hours: '16:00 - 22:00',
                price: 'R$ 50-100',
                city: 'Jataí',
                image: '🍲',
                latitude: -17.8800,
                longitude: -51.7160,
                phone: '(64) 3461-4444',
            },
            {
                id: 5,
                name: 'Marieta Café Bar',
                cuisine: 'Café/Petiscos',
                rating: 4.4,
                reviews: 189,
                address: 'Rua Central, 450',
                hours: '10:00 - 20:00',
                price: 'R$ 30-60',
                city: 'Jataí',
                image: '☕',
                latitude: -17.8805,
                longitude: -51.7155,
                phone: '(64) 3461-5555',
            },
        ];

        const events = [
            {
                id: 1,
                name: 'Festa Eletrônica - DJ Marcos',
                date: '01 de Março',
                time: '23:00',
                location: 'Beer Garden',
                emoji: '🎧',
                attendees: 450,
                description: 'Melhor festa eletrônica da semana com DJ Marcos ao vivo',
            },
            {
                id: 2,
                name: 'Sertanejo ao Vivo',
                date: '02 de Março',
                time: '21:00',
                location: 'Rancho Tardezinha',
                emoji: '🎸',
                attendees: 200,
                description: 'Show ao vivo com banda sertaneja tradicional',
            },
            {
                id: 3,
                name: 'Happy Hour Especial',
                date: '03 de Março',
                time: '18:00',
                location: 'Santa Brasa Café Grill',
                emoji: '🥂',
                attendees: 150,
                description: 'Drinks com 50% de desconto e petiscos grátis',
            },
            {
                id: 4,
                name: 'Noite de Karaokê',
                date: '04 de Março',
                time: '20:00',
                location: 'Isi Bar',
                emoji: '🎤',
                attendees: 120,
                description: 'Noite de karaokê com prêmios e sorteios',
            },
            {
                id: 5,
                name: 'Festa Universitária',
                date: '05 de Março',
                time: '22:00',
                location: 'Beer Garden',
                emoji: '🎉',
                attendees: 600,
                description: 'Festa exclusiva para universitários com entrada promocional',
            },
        ];

        let map = null;
        let markers = [];

        function renderHome(events) {
            const html = events.slice(0, 3).map(event => `
                <div class="card" onclick="openModal('event', ${event.id})">
                    <div class="card-image">${event.emoji}</div>
                    <div class="card-content">
                        <div class="card-name">${event.name}</div>
                        <div class="card-category">${event.date} às ${event.time}</div>
                        <div class="card-address">${event.location}</div>
                    </div>
                </div>
            `).join('');
            document.getElementById('home-events').innerHTML = html;
        }

        function renderBars(places) {
            const html = places.map(place => `
                <div class="card" onclick="openModal('place', ${place.id})">
                    <div class="card-image">${place.image}</div>
                    <div class="card-content">
                        <div class="card-name">${place.name}</div>
                        <div class="card-category">${place.category}</div>
                        <div class="card-address">${place.address}</div>
                        <div class="card-footer">
                            <span class="card-rating">⭐ ${place.rating}</span>
                            <span class="card-price">${place.price}</span>
                        </div>
                        <button class="card-button" onclick="openGoogleMaps(${place.latitude}, ${place.longitude})">🗺️ Ver no Mapa</button>
                    </div>
                </div>
            `).join('');
            document.getElementById('bars-list').innerHTML = html;
        }

        function renderRestaurants(restaurants) {
            const html = restaurants.map(restaurant => `
                <div class="card" onclick="openModal('restaurant', ${restaurant.id})">
                    <div class="card-image">${restaurant.image}</div>
                    <div class="card-content">
                        <div class="card-name">${restaurant.name}</div>
                        <div class="card-category">${restaurant.cuisine}</div>
                        <div class="card-address">${restaurant.address}</div>
                        <div class="card-footer">
                            <span class="card-rating">⭐ ${restaurant.rating}</span>
                            <span class="card-price">${restaurant.price}</span>
                        </div>
                        <button class="card-button" onclick="openGoogleMaps(${restaurant.latitude}, ${restaurant.longitude})">🗺️ Ver no Mapa</button>
                    </div>
                </div>
            `).join('');
            document.getElementById('restaurants-list').innerHTML = html;
        }

        function renderEvents(events) {
            const html = events.map(event => `
                <div class="card" onclick="openModal('event', ${event.id})">
                    <div class="card-image">${event.emoji}</div>
                    <div class="card-content">
                        <div class="card-name">${event.name}</div>
                        <div class="card-category">${event.date} às ${event.time}</div>
                        <div class="card-address">${event.location}</div>
                        <div class="card-footer">
                            <span class="card-rating">👥 ${event.attendees}</span>
                        </div>
                    </div>
                </div>
            `).join('');
            document.getElementById('events-list').innerHTML = html;
        }

        function switchTab(tabName) {
            document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-button').forEach(el => el.classList.remove('active'));

            const screen = document.getElementById(tabName === 'map' ? 'map-screen' : tabName);
            if (screen) {
                screen.classList.add('active');
            }

            if (event.target) {
                event.target.classList.add('active');
            }

            if (tabName === 'map' && !map) {
                initMap();
            }
        }

        function initMap() {
            map = L.map('map').setView([-17.88, -51.71], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap',
                maxZoom: 19,
            }).addTo(map);

            // Adicionar marcadores de bares
            places.forEach(place => {
                const marker = L.marker([place.latitude, place.longitude])
                    .bindPopup(`<strong>${place.name}</strong><br>${place.address}<br>⭐ ${place.rating}`)
                    .addTo(map);
                markers.push(marker);
            });

            // Adicionar marcadores de restaurantes
            restaurants.forEach(restaurant => {
                const marker = L.marker([restaurant.latitude, restaurant.longitude])
                    .bindPopup(`<strong>${restaurant.name}</strong><br>${restaurant.address}<br>⭐ ${restaurant.rating}`)
                    .addTo(map);
                markers.push(marker);
            });
        }

        function openModal(type, id) {
            let item;
            if (type === 'place') {
                item = places.find(p => p.id === id);
            } else if (type === 'restaurant') {
                item = restaurants.find(r => r.id === id);
            } else if (type === 'event') {
                item = events.find(e => e.id === id);
            }

            if (!item) return;

            let html = `
                <span class="modal-close" onclick="closeModal()">&times;</span>
                <h2>${item.name}</h2>
                <div class="modal-info">
                    <p><strong>Endereço:</strong> ${item.address}</p>
                    <p><strong>Avaliação:</strong> ⭐ ${item.rating} (${item.reviews || 0} avaliações)</p>
                    <p><strong>Horário:</strong> ${item.hours || item.date}</p>
                    <p><strong>Preço:</strong> ${item.price}</p>
                    ${item.phone ? `<p><strong>Telefone:</strong> <a href="tel:${item.phone}" style="color: #7c3aed;">${item.phone}</a></p>` : ''}
                    ${item.description ? `<p><strong>Descrição:</strong> ${item.description}</p>` : ''}
                </div>
                <div class="modal-buttons">
                    ${item.latitude ? `<button class="modal-button modal-button-primary" onclick="openGoogleMaps(${item.latitude}, ${item.longitude})">🗺️ Abrir no Mapa</button>` : ''}
                    <button class="modal-button modal-button-secondary" onclick="closeModal()">Fechar</button>
                </div>
            `;

            document.getElementById('modal-body').innerHTML = html;
            document.getElementById('modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }

        function openGoogleMaps(lat, lng) {
            const url = `https://www.google.com/maps/search/?api=1&query=${lat},${lng}`;
            window.open(url, '_blank');
        }

        // Carregar dados ao iniciar
        renderHome(events);
        renderBars(places);
        renderRestaurants(restaurants);
        renderEvents(events);
    </script>
</body>
</html>
